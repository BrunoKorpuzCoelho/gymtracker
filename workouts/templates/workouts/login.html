{% extends 'workouts/base.html' %}
{% block title %}Login — GymTracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <div class="logo-icon">🏋️</div>
        <h1>GymTracker</h1>
        <p class="auth-subtitle">Log in to track your gains</p>
    </div>

    <form method="post" class="auth-form" autocomplete="on">
        {% csrf_token %}

        {% if form.errors %}
        <div class="form-error">
            Invalid username or password. Try again.
        </div>
        {% endif %}

        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="form-input"
                   autocomplete="username" required autofocus maxlength="150">
        </div>

        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="form-input"
                   autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Log In</button>
    </form>

    <p class="auth-footer">
        Don't have an account? <a href="{% url 'register' %}">Register</a>
    </p>
</div>
{% endblock %}
