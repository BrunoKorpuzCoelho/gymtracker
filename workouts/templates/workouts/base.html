{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <title>{% block title %}GymTracker{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'workouts/css/style.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="bottom-nav">
        <a href="{% url 'calendar' %}" class="nav-item {% if nav_active == 'calendar' or request.resolver_match.url_name == 'calendar' %}active{% endif %}">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>Plan</span>
        </a>
        <a href="{% url 'dashboard' %}" class="nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/>
            </svg>
            <span>Progress</span>
        </a>
        <a href="{% url 'exercise_progress' %}" class="nav-item {% if request.resolver_match.url_name == 'exercise_progress' %}active{% endif %}">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h2"/><path d="M19 6h2"/><path d="M6 6v12a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V6"/>
                <path d="M9 6V4h6v2"/><line x1="9" y1="12" x2="15" y2="12"/>
            </svg>
            <span>Exercises</span>
        </a>
        <a href="{% url 'logout' %}" class="nav-item">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span>Logout</span>
        </a>
    </nav>
    {% endif %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        // CSRF token helper for all fetch requests
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        const CSRF_TOKEN = getCookie('csrftoken');

        async function apiFetch(url, data) {
            const resp = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': CSRF_TOKEN,
                },
                credentials: 'same-origin',
                body: JSON.stringify(data),
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.error || `HTTP ${resp.status}`);
            }
            return resp.json();
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
